apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  annotations:
    cert-manager.io/inject-ca-from: {{ include "oracle-database-operator.certManagerInjectAnnotation" . }}
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "3"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
  name: {{ include "oracle-database-operator.name" . }}-mutating-webhook-configuration
  labels:
    {{- include "oracle-database-operator.labels" . | nindent 4 }}
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: {{ include "oracle-database-operator.webhookServiceName" $ }}
      namespace: {{ include "oracle-database-operator.namespace" $ }}
      path: /mutate-database-oracle-com-v4-dbcssystem
  failurePolicy: Fail
  name: mdbcssystemv4.kb.io
  rules:
  - apiGroups:
    - database.oracle.com
    apiVersions:
    - v4
    operations:
    - CREATE
    - UPDATE
    resources:
    - dbcssystems
  sideEffects: None
- admissionReviewVersions:
  - v4
  - v1beta1
  clientConfig:
    service:
      name: {{ include "oracle-database-operator.webhookServiceName" $ }}
      namespace: {{ include "oracle-database-operator.namespace" $ }}
      path: /mutate-database-oracle-com-v4-lrest
  failurePolicy: Fail
  name: mlrest.kb.io
  rules:
  - apiGroups:
    - database.oracle.com
    apiVersions:
    - v4
    operations:
    - CREATE
    - UPDATE
    resources:
    - lrests
  sideEffects: None
- admissionReviewVersions:
  - v4
  - v1beta1
  clientConfig:
    service:
      name: {{ include "oracle-database-operator.webhookServiceName" $ }}
      namespace: {{ include "oracle-database-operator.namespace" $ }}
      path: /mutate-database-oracle-com-v4-lrpdb
  failurePolicy: Fail
  name: mlrpdb.kb.io
  rules:
