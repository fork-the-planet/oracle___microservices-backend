      name: {{ include "oracle-database-operator.webhookServiceName" $ }}
      namespace: {{ include "oracle-database-operator.namespace" $ }}
      path: /mutate-database-oracle-com-v4-oraclerestart
  failurePolicy: Fail
  name: moraclerestart.kb.io
  rules:
  - apiGroups:
    - database.oracle.com
    apiVersions:
    - v4
    operations:
    - CREATE
    - UPDATE
    resources:
    - oraclerestarts
  sideEffects: None
- admissionReviewVersions:
  - v1
