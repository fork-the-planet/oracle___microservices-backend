apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  annotations:
    cert-manager.io/inject-ca-from: {{ include "oracle-database-operator.certManagerInjectAnnotation" . }}
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "3"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
  name: {{ include "oracle-database-operator.name" . }}-validating-webhook-configuration
  labels:
    {{- include "oracle-database-operator.labels" . | nindent 4 }}
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: {{ include "oracle-database-operator.webhookServiceName" $ }}
      namespace: {{ include "oracle-database-operator.namespace" $ }}
      path: /validate-database-oracle-com-v4-autonomouscontainerdatabase
  failurePolicy: Fail
  name: vautonomouscontainerdatabasev4.kb.io
  rules:
  - apiGroups:
    - database.oracle.com
    apiVersions:
    - v4
    operations:
    - CREATE
    - UPDATE
    resources:
    - autonomouscontainerdatabases
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: {{ include "oracle-database-operator.webhookServiceName" $ }}
      namespace: {{ include "oracle-database-operator.namespace" $ }}
      path: /validate-database-oracle-com-v4-autonomousdatabasebackup
  failurePolicy: Fail
  name: vautonomousdatabasebackupv4.kb.io
  rules:
  - apiGroups:
    - database.oracle.com
    apiVersions:
    - v4
    operations:
    - CREATE
    - UPDATE
    resources:
    - autonomousdatabasebackups
  sideEffects: None
- admissionReviewVersions:
  - v1
