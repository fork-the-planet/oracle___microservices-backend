{{- if .Values.kafka.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: kafka-bootstrap
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
    app.kubernetes.io/component: kafka-bridge
spec:
  type: ExternalName
  externalName: {{ .Release.Name }}-kafka-cluster-kafka-bootstrap.{{ .Release.Namespace }}.svc.cluster.local
{{- end }}
