{{- if (index .Values "apisix").enabled }}
{{- if (index .Values "gateway-helm").enabled }}
{{- $gw := index .Values "gateway-helm" }}
{{- $legacyEnvoyImage := dig "config" "envoyGateway" "provider" "kubernetes" "envoyDeployment" "container" "image" "" $gw }}
{{- $envoyImage := default $legacyEnvoyImage (dig "global" "images" "envoyProxy" "image" "" $gw) }}
{{- $imageRegistry := dig "global" "imageRegistry" "" $gw }}
{{- if and $envoyImage $imageRegistry }}
{{- $imageParts := splitn "/" 2 $envoyImage }}
{{- if $imageParts._1 }}
{{- $envoyImage = printf "%s/%s" $imageRegistry $imageParts._1 }}
{{- end }}
{{- end }}
{{- $envoyPullSecrets := dig "global" "images" "envoyProxy" "pullSecrets" (list) $gw }}
{{- if not $envoyPullSecrets }}
{{- $envoyPullSecrets = dig "global" "imagePullSecrets" (list) $gw }}
{{- end }}
{{- $hasEnvoyPullSecrets := or $envoyPullSecrets .Values.global.imagePullSecrets .Values.global.imagePullSecretName }}
{{- if $envoyImage }}
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: {{ .Release.Name }}-envoy-proxy
  namespace: {{ .Release.Namespace }}
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment:
        container:
          image: {{ $envoyImage | quote }}
        {{- if $hasEnvoyPullSecrets }}
        pod:
          {{- include "obaas.imagePullSecrets" (dict "local" $envoyPullSecrets "global" .Values.global.imagePullSecrets "secretName" .Values.global.imagePullSecretName) | nindent 10 }}
        {{- end }}
---
{{- end }}
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: {{ .Release.Name }}-envoy-gateway
  namespace: {{ .Release.Namespace }}
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
  {{- if $envoyImage }}
  parametersRef:
    group: gateway.envoyproxy.io
    kind: EnvoyProxy
    name: {{ .Release.Name }}-envoy-proxy
    namespace: {{ .Release.Namespace }}
  {{- end }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Release.Name }}-envoy-apisix
  namespace: {{ .Release.Namespace }}
spec:
  gatewayClassName: {{ .Release.Name }}-envoy-gateway
  listeners:
    - name: http
      port: 80
      protocol: HTTP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}-envoy-apisix-all-hosts
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: {{ .Release.Name }}-envoy-apisix
  rules:
    - backendRefs:
        - name: {{ printf "%s-apisix-gateway" .Release.Name }}
          port: 80
      matches:
        - path:
            type: PathPrefix
            value: /
{{- end }}
{{- end }}
