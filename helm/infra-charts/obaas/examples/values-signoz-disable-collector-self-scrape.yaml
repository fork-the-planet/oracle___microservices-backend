# Disable the SigNoz OpenTelemetry collector's Prometheus self-scrape.
#
# The collector's default metrics endpoint listens on 127.0.0.1:8888, while
# Kubernetes pod discovery targets the pod IP. Removing the discovery
# annotations prevents repeated failed scrape warnings without affecting OTLP
# ingestion or scraping of other annotated pods.
#
# Use with the installation's base values file:
#
# helm upgrade --install <app-release> helm/infra-charts/obaas \
#   -n <application-namespace> \
#   -f <base-values-file> \
#   -f helm/infra-charts/obaas/examples/values-signoz-disable-collector-self-scrape.yaml

signoz:
  otelCollector:
    # `null` removes the subchart's default annotations. `{}` would merge with
    # those defaults and leave signoz.io/scrape enabled.
    podAnnotations: null
