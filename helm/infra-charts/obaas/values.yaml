# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

# -----------------------
# -- Global Configuration
global:
  # All OBaaS components install into the release namespace (specified with -n flag)
  # There is no global namespace override - components use the namespace you provide during install

  # When true, all PVCs in the namespace are deleted during helm uninstall
  # This ensures a clean reinstall but destroys all persistent data
  cleanupPVCs: true

  # When true, creates resources needed for air-gapped (disconnected) environments
  # including a self-signed TLS certificate for accounts.google.com
  airGapped: false

  # Image pull secret name for private registries.
  # To configure, first create the secret in your namespace:
  #   kubectl create secret docker-registry myregistry-secret \
  #     --docker-server=myregistry.example.com \
  #     --docker-username=<user> --docker-password=<pass> -n <namespace>
  # Then replace "" with your secret name (keep &secretName and &imagePullSecrets as-is):
  #   imagePullSecretName: &secretName myregistry-secret
  #   imagePullSecrets: &imagePullSecrets
  #     - *secretName
  # The &secretName and &imagePullSecrets anchors are YAML plumbing that propagate the
  # value to OBaaS templates and subcharts that accept string secret lists.
  # Some upstream subcharts require {name: ...} objects; see examples/values-private-registry.yaml.
  # See examples/values-private-registry.yaml for a complete working example.
  imagePullSecretName: &secretName ""

  # Image pull secrets list (string format for OBaaS helper compatibility).
  # OBaaS helpers normalize strings to {name: ...} objects where needed.
  # Do not remove &imagePullSecrets or *secretName — they wire the value to subcharts.
  imagePullSecrets: &imagePullSecrets []

  # Utility image used by hooks and jobs
  utilities:
    kubectl:
      image:
        registry: docker.io
        repository: alpine/k8s
        tag: "1.28.13"
    nginx:
      image:
        registry: docker.io
        repository: nginx
        tag: "alpine"

# OBAAS PLATFORM CONFIGURATION
otelCollectorEndpoint: "obaas-signoz-otel-collector:4318"

# -----------------------
# -- Network Policy Configuration
networkPolicy:
  # Creates namespace-scoped NetworkPolicy resources for the OBaaS release.
  # Enforcement requires a Kubernetes CNI plugin that implements NetworkPolicy.
  enabled: true

  # Allow pod-to-pod traffic within the OBaaS release namespace.
  allowSameNamespace: true

  # Allow external clients and the Kubernetes control plane to reach gateway,
  # ingress, and webhook endpoints that are intentionally exposed by OBaaS.
  allowPublicIngress: true

  # Allow egress to destinations outside the release namespace. Keep enabled
  # unless you also provide extraEgress rules for your database, OCI services,
  # identity providers, image registries, and other required endpoints.
  allowExternalEgress: true

  dns:
    # Allow DNS lookups to CoreDNS/kube-dns.
    enabled: true
    namespaceSelector:
      kubernetes.io/metadata.name: kube-system
    podSelector:
      k8s-app: kube-dns

  # Additional raw NetworkPolicy ingress rules applied to all pods.
  extraIngress: []

  # Additional raw NetworkPolicy egress rules applied to all pods.
  extraEgress: []

# -----------------------
# -- OBaaS Configuration
#
# Note: Cluster-singleton prerequisites must be installed via the obaas-prereqs chart before installing this chart.
# Install obaas-prereqs once per cluster.
#
# Image Override Pattern:
# All image configurations are commented out by default to use upstream defaults.
# To use a private registry or air-gapped installation, uncomment and set the image values.
# Example: Change "registry.k8s.io" to "myregistry.example.com" for all components.

# -----------------------
# -- OBaaS Component Configuration

# AI Optimizer and Toolkit
ai-optimizer:
  enabled: false
  global:
    baseUrlPath: "/ai-optimizer"
  server:
    replicaCount: 1
    # -- Image details: Required for BYO Infra
    # imagePullSecrets: []
    # image:
    #   repository: localhost/ai-optimizer-server
    #   tag: latest
    #   pullPolicy: IfNotPresent
  client:
    enabled: true
    # -- Image details: Required for BYO Infra
    # imagePullSecrets: []
    # image:
    #   repository: localhost/ai-optimizer-client
    #   tag: latest
    #   pullPolicy: IfNotPresent

# Eureka Service Discovery
eureka:
  enabled: true
  replicas: 3
  # Keep Jetty server connections alive longer than APISIX/OpenResty's
  # 60-second pooled connection lifetime to avoid reusing server-closed sockets.
  connectionIdleTimeout: 90s
  image:
    repository: container-registry.oracle.com/obaas/service-registry
    tag: "2.1.0"
  # Override default resources if needed (defaults: cpu 250m-500m, memory 1Gi-1200Mi)
  resources: {}

gateway-helm:
  enabled: true

  # Envoy Gateway controller configuration
  config:
    envoyGateway:
      provider:
        type: Kubernetes

  # Global settings
  global:
    # -- Global override for image registry
    imageRegistry: ""
    # -- Global override for image pull secrets
    imagePullSecrets: *imagePullSecrets

    # If set, these override image-specific values: useful when installing the chart in a private registry environment.
    # Override image-specific values directly if a global override is not desired.
    images:
      envoyGateway:
        # This is the full image name including the hub, repo, and tag.
        image: "docker.io/envoyproxy/gateway:v1.8.1"
        # Specify image pull policy if default behavior isn't desired.
        # Default behavior: latest images will be Always else IfNotPresent.
        pullPolicy: Always
        # List of secrets in the same namespace of the component that can be used to pull images from private repositories.
        pullSecrets: *imagePullSecrets
      envoyProxy:
        # Envoy proxy data plane image — override to use a private registry.
        # Legacy overrides under config.envoyGateway.provider.kubernetes.envoyDeployment
        # are still honored by OBaaS templates when this value is empty.
        image: "docker.io/envoyproxy/envoy:distroless-v1.38.1"
        pullPolicy: IfNotPresent
        # List of secrets in the same namespace that can pull the Envoy proxy image.
        pullSecrets: *imagePullSecrets
      ratelimit:
        # This is the full image name including the hub, repo, and tag.
        image: "docker.io/envoyproxy/ratelimit:3fb70258"
        # Specify image pull policy if default behavior isn't desired.
        # Default behavior: latest images will be Always else IfNotPresent.
        pullPolicy: IfNotPresent
        # List of secrets in the same namespace of the component that can be used to pull images from private repositories.
        pullSecrets: *imagePullSecrets

  deployment:
    pod:
      annotations:
        "signoz.io/scrape": "true"
        "signoz.io/port": "19001"
        "signoz.io/path": "/metrics"
    replicas: 1


ingress-nginx:
  enabled: false
  # ingress-nginx (deprecated) requires object format [{name: "x"}]; configure independently:
  # imagePullSecrets:
  #   - name: myregistry-secret
  imagePullSecrets: []
  controller:
    metrics:
      enabled: true
    podAnnotations:
      "signoz.io/scrape": "true"
      "signoz.io/port": "10254"
      "signoz.io/path": "/metrics"
    # Scope to release namespace only (default is false - watches all namespaces)
    scope:
      enabled: true
    # Uncomment to override the default image registry
    # image:
    #   registry: "myregistry.example.com"  # Default: registry.k8s.io
    #   image: ingress-nginx/controller

apisix:
  enabled: true
  global:
    imagePullSecrets: *imagePullSecrets

  # RBAC required for Kubernetes service discovery
  rbac:
    create: true
  serviceAccount:
    create: true

  # APISIX configuration
  apisix:
    # Minimal plugins list - only what routes actually use
    # (prometheus is in APISIX defaults, but opentelemetry is not)
    plugins:
      # Required
      - api-breaker
      - authz-keycloak
      - basic-auth
      - batch-requests
      - consumer-restriction
      - opentelemetry
      - prometheus
      # Need Evaluation
      - ai
      - authz-casbin
      - authz-casdoor
      - aws-lambda
      - azure-functions
      - body-transformer
      - cas-auth
      - chaitin-waf
      - clickhouse-logger
      - client-control
      - cors
      - csrf
      - datadog
      - degraphql
      - echo
      - elasticsearch-logger
      - example-plugin
      - ext-plugin-post-req
      - ext-plugin-post-resp
      - ext-plugin-pre-req
      - fault-injection
      - file-logger
      - forward-auth
      - google-cloud-logging
      - grpc-transcode
      - grpc-web
      - gzip
      - hmac-auth
      - http-dubbo
      - http-logger
      - inspect
      - ip-restriction
      - jwe-decrypt
      - jwt-auth
      - kafka-logger
      - kafka-proxy
      - key-auth
      - ldap-auth
      - limit-conn
      - limit-count
      - limit-req
      - loggly
      - loki-logger
      - mocking
      - multi-auth
      - opa
      - openfunction
      - openid-connect
      - openwhisk
      - proxy-cache
      - proxy-control
      - proxy-mirror
      - proxy-rewrite
      - public-api
      - real-ip
      - redirect
      - referer-restriction
      - request-id
      - request-validation
      - response-rewrite
      - rocketmq-logger
      - server-info
      - serverless-post-function
      - serverless-pre-function
      - skywalking-logger
      - sls-logger
      - splunk-hec-logging
      - syslog
      - tcp-logger
      - tencent-cloud-cls
      - traffic-split
      - ua-restriction
      - udp-logger
      - uri-blocker
      - wolf-rbac
      - workflow
      - zipkin

    # Service Discovery
    discovery:
      enabled: true
      registry:
        # Eureka service discovery - connects directly to each StatefulSet replica
        # so APISIX can fail over within the same registry refresh cycle.
        eureka:
          host:
            - "http://{{ .Release.Name }}-eureka-0.{{ .Release.Name }}-eureka.{{ .Release.Namespace }}.svc.cluster.local:8761"
            - "http://{{ .Release.Name }}-eureka-1.{{ .Release.Name }}-eureka.{{ .Release.Namespace }}.svc.cluster.local:8761"
            - "http://{{ .Release.Name }}-eureka-2.{{ .Release.Name }}-eureka.{{ .Release.Namespace }}.svc.cluster.local:8761"
          prefix: "/eureka/"
          fetch_interval: 30
          timeout:
            connect: 2000
            send: 5000
            read: 15000
          weight: 100
        # Kubernetes service discovery
        kubernetes: {}

    # OpenTelemetry - connects to SigNoz via the signoz-otel-collector alias service
    # (see templates/observability/Service-signoz-otel-collector-alias.yaml)
    pluginAttrs:
      opentelemetry:
        collector:
          address: "http://signoz-otel-collector:4318"
          request_timeout: 3
        resource:
          service.name: APISIX
        trace_id_source: x-request-id
        # Consumed by templates/apisix/Job-apisix-plugin-metadata.yaml, which
        # PUTs this whole opentelemetry block to the Admin API's runtime
        # plugin_metadata store (a separate mechanism from pluginAttrs above,
        # which only seeds the static config file). Kept here as the single
        # source of truth rather than duplicated in a second config block.
        batch_span_processor:
          drop_on_queue_full: false
          max_queue_size: 1024
          batch_timeout: 2
          inactive_timeout: 1
          max_export_batch_size: 16
        set_ngx_var: false
      prometheus:
        export_uri: /metrics
        metric_prefix: apisix_
        enable_export_server: true
        export_addr:
          ip: 0.0.0.0
          port: 9091

    # Environment variables required for Kubernetes service discovery
    nginx:
      envs:
        - KUBERNETES_SERVICE_HOST
        - KUBERNETES_SERVICE_PORT

  # etcd configuration
  etcd:
    enabled: true
    replicaCount: 3
    # Disable pre-upgrade hook when etcd is being installed for the first time
    # (even if the parent chart is being upgraded)
    preUpgradeJob:
      enabled: false
    image:
      registry: docker.io
      repository: bitnamilegacy/etcd
      tag: "3.6.1"

  # APISIX image configuration
  # Full registry path required for clusters with short name mode enforcing
  image:
    repository: "docker.io/apache/apisix"
    tag: "3.16.0-ubuntu"

  # Init container image
  initContainer:
    image: "docker.io/busybox"
    tag: "1.37"

  # Sidecar that registers the opentelemetry plugin's runtime plugin_metadata
  # via the Admin API. This must run as a sidecar (sharing the pod's network
  # namespace) rather than a separate Job/pod, because the Admin API's
  # allow_admin allowlist restricts callers to 127.0.0.1. It reads the
  # collector/resource/batch_span_processor config back out of the already
  # rendered config.yaml (plugin_attr.opentelemetry), which is the exact same
  # values.yaml pluginAttrs.opentelemetry block above, so there is a single
  # source of truth instead of a duplicated payload here.
  extraContainers:
    - name: apisix-plugin-metadata
      image: "docker.io/alpine/k8s:1.28.13"
      command: ["sh", "-c"]
      args:
        - |
          set -e
          until curl -s -o /dev/null http://127.0.0.1:9180/apisix/admin/routes; do
            echo "Waiting for apisix admin API..."; sleep 5
          done

          admin_key=$(yq '.deployment.admin.admin_key[] | select(.name == "admin") | .key' /apisix-config/config.yaml)
          if [ -z "$admin_key" ] || [ "$admin_key" = "null" ]; then
            echo "ERROR: could not extract APISIX admin_key from mounted config"
            exit 1
          fi

          payload=$(yq -o=json '.plugin_attr.opentelemetry' /apisix-config/config.yaml)

          http_status=$(curl -s -o /dev/null -w "%{http_code}" \
            http://127.0.0.1:9180/apisix/admin/plugin_metadata/opentelemetry \
            -H "X-API-KEY: ${admin_key}" \
            -X PUT \
            -d "$payload")

          unset admin_key

          if [ "$http_status" -ge 200 ] && [ "$http_status" -lt 300 ]; then
            echo "APISIX opentelemetry plugin_metadata configured successfully (HTTP ${http_status})"
          else
            echo "ERROR: failed to set plugin_metadata (HTTP ${http_status})"
            exit 1
          fi

          exec sleep infinity
      volumeMounts:
        - name: apisix-config
          mountPath: /apisix-config
          readOnly: true

# Admin Server
admin-server:
  enabled: true
  replicas: 1
  image:
    repository: container-registry.oracle.com/obaas/admin-server
    tag: "2.1.0"
  # Override default resources if needed (defaults: cpu 250m-500m, memory 256Mi-512Mi)
  # resources: {}

# Config Server
config-server:
  enabled: true
  replicas: 1
  image:
    repository: container-registry.oracle.com/obaas/config-server
    tag: "2.1.0"
  # Override default resources if needed (defaults: cpu 250m-500m, memory 256Mi-512Mi)
  # resources: {}

# Oracle Transaction Manager for Microservices (OTMM - MicroTX)

otmm:
  commonConfiguration:
    externalURL: {}
    security:
      enabled: false
      clientSecretName: ""
      identityProvider:
        serverType: "other"
        issuer: ""
        jwksUri: ""
        identityProviderUrl: ""
        audience: ""
        scopes: ""
        adminUserRoles: ""
        adminUserRolesPath: "roles"
        policy:
          claimsRolePaths: "roles"
          roles:
            superAdmin: "microtx-conductor-super-admin"
            admin: "microtx-conductor-admin"
            user: "microtx-conductor-user"
            readOnlyUser: "microtx-conductor-read-only-user"
            metadataManager: "microtx-conductor-metadata-manager"
            worker: "microtx-conductor-worker"
  coordinator:
    enabled: true
    replicas: 1
    image:
      repository: container-registry.oracle.com/database/microtx-coordinator
      tag: "26.1.1"
      pullPolicy: IfNotPresent
    metrics:
      enabled: true
      scrape:
        enabled: true
        port: "9000"
        path: "/metrics"
  workflowServer:
    enabled: true
    encryption:
      enabled: true
    logging: {}
    metrics:
      enabled: true
      scrape:
        enabled: true
        port: "9010"
        path: "/workflow-server/actuator/prometheus"
    probes:
      startup:
        enabled: true
        path: "/workflow-server/health"
        port: 9010
        initialDelaySeconds: 20
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 18
      liveness:
        path: "/workflow-server/health"
        port: 9010
        initialDelaySeconds: 20
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 3
      readiness:
        path: "/workflow-server/health"
        port: 9010
        initialDelaySeconds: 10
        periodSeconds: 5
        timeoutSeconds: 5
        failureThreshold: 3
    taskConfig:
      txeventq: {}
      transaction: {}
      grpc: {}
      sql: {}
    config:
      indexing:
        enabled: true
      storage:
        fileSystem: {}
    image:
      repository: container-registry.oracle.com/database/microtx-workflow
      tag: "26.1.1"
      pullPolicy: IfNotPresent
    replicas: 1
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: "2"
        memory: 4Gi
  console:
    enabled: true
    image:
      repository: container-registry.oracle.com/database/microtx-console
      tag: "26.1.1"
      pullPolicy: IfNotPresent
  # Override default resources if needed (defaults: cpu 250m, memory 1Gi)
  # resources: {}

# Oracle Database Exporter (Prometheus metrics for Oracle Database)
oracle-database-exporter:
  enabled: true
  replicas: 1
  image:
    repository: container-registry.oracle.com/database/observability-exporter
    tag: "2.4.0"
  # Busybox sidecar for tailing alert.log
  busybox:
    repository: docker.io/busybox
    tag: "1.37"
  # Override default resources if needed (defaults: cpu 250m-500m, memory 64Mi-128Mi)
  # resources: {}

# Database Configuration
# Supports SIDB-FREE, ADB-FREE, ADB-S (OCI Autonomous Database), or OTHER (external database)
database:
  # Database type: SIDB-FREE, ADB-FREE, ADB-S, or OTHER
  type: "SIDB-FREE"
  # SQLcl image for database initialization jobs
  sqlcl:
    image:
      repository: container-registry.oracle.com/database/sqlcl
      tag: "26.1.2"

  # For SIDB-FREE/ADB-FREE: container image configuration (exclude for ADB-S)
  image:
    repository: "container-registry.oracle.com/database/free"
    tag: "23.26.2.0"

  # For ADB-S: OCI Autonomous Database OCID (exclude for SIDB-FREE/ADB-FREE/OTHER)
  oci:
    ocid: ""

  # For OTHER: External database connectivity
  # Either provide 'dsn' OR all of (host, port, service_name)
  other:
    # Full DSN string (e.g: mydbhost.com:1521/mydb_service)
    # If provided, supersedes host/port/service_name
    dsn: ""
    # Database host (e.g: mydbhost.com)
    # Required if dsn is not provided
    host: ""
    # Database port (e.g: 1521)
    # Required if dsn is not provided
    port: ""
    # Database service name (e.g: mydb_service)
    # Required if dsn is not provided
    service_name: ""

  # Privileged User Authentication (for database initialization)
  # This is the ADMIN (ADB) or SYSTEM (non-ADB) user that creates the application user
  # ADB-S and OTHER: REQUIRED for these pre-created databases
  # SIDB-FREE, ADB-FREE: OPTIONAL; If not provided, a secret will be auto-generated with random password.
  privAuthN:
    # Name of Secret containing privileged user credentials
    # secretName: ""
    # Namespace of the privileged user secret
    # secretNamespace: ""
    # Override default key names in the secret (defaults: username, password, service)
    # usernameKey: "username"
    # passwordKey: "password"
    # serviceKey: "service"

  # Application User Authentication/Connection Details
  authN:
    # Namespace containing application user secret (secretName)
    # secretNamespace: ""
    # Name of Secret containing the authentication/connection details
    # If not provided, a secret will be auto-generated with random password
    # secretName: ""
    # Override default key names in the secret (defaults: username, password, service)
    # usernameKey: "username"
    # passwordKey: "password"
    # serviceKey: "service"

  # OCI Configuration (for ADB-S authentication)
  # Either use API key authentication OR Workload Identity
  oci_config:
    # For Workload Identity authentication:
    # Set to true to use OKE Workload Identity (no API key needed but requires Workload Identity)
    # oke: false

    # Namespace of the configmap/secret for OCI API Authentication
    # configNamespace: ""

    # For API key authentication:
    # Name of secret containing oci_api_key.pem
    # keySecretName: ""

    # Option 1: Reference to existing ConfigMap with OCI config
    # If provided, tenancy/user/fingerprint/region below will be ignored
    # configMapName: ""

    # Option 2: Provide OCI config values to create a ConfigMap
    # Only use these if configMapName is not provided
    # tenancy: ""
    # user: ""
    # fingerprint: ""
    # region: ""

signoz:
  enabled: true
  global:
    imagePullSecrets: *imagePullSecrets
  # Utility images for setup jobs
  utilities:
    curlJq:
      image:
        registry: docker.io
        repository: curlimages/curl
        tag: "8.20.0"
    busybox:
      image:
        registry: docker.io
        repository: busybox
        tag: 1.37
  # Authentication configuration for SigNoz admin user
  auth:
    # Existing secret configuration
    # If existingSecret is specified, it will be used instead of creating a new one
    # The secret must contain 'email' and 'password' keys
    existingSecret: ""
    # Email for the admin user (only used when existingSecret is not specified)
    # A random password will be automatically generated
    email: "admin@example.com"
  instrumentation:
    sampler:
      # e.g. parentbased_traceidratio, always_on, always_off
      # Using parentbased_traceidratio ensures distributed traces are kept intact
      type: "parentbased_traceidratio"
      # Only applies if using a ratio sampler. 1.0 = 100%, 0.1 = 10%
      argument: "1.0"
    java:
      # Export Spring Boot application metrics through the injected Java agent.
      env:
        - name: OTEL_METRICS_EXPORTER
          value: otlp
        - name: OTEL_LOGS_EXPORTER
          value: none
        - name: OTEL_EXPORTER_OTLP_PROTOCOL
          value: http/protobuf
  
  # Change to override individual component images
  signoz:
    # Auto-provision root user in SigNoz backend
    env:
      SIGNOZ_USER_ROOT_ENABLED: "true"
      SIGNOZ_USER_ROOT_ORG_NAME: "OBaaS"
      SIGNOZ_USER_ROOT_EMAIL: "admin@example.com"
      SIGNOZ_USER_ROOT_PASSWORD:
        valueFrom:
          secretKeyRef:
            name: signoz-authn
            key: password
      SIGNOZ_API_KEY:
        valueFrom:
          secretKeyRef:
            name: signoz-authn
            key: password
      SIGNOZ_TOKENIZER_JWT_SECRET:
        valueFrom:
          secretKeyRef:
            name: signoz-authn
            key: password
    image:
      registry: docker.io
      repository: signoz/signoz
    initContainers:
      init:
        image:
          registry: docker.io
          repository: busybox
          tag: "1.37"
  telemetryStoreMigrator:
    enabled: true
  otelCollector:
    image:
      registry: docker.io
      repository: signoz/signoz-otel-collector
    # Override podAnnotations to tune or disable collector self-scrape.
    # The SigNoz subchart default scrapes collector metrics on port 8888.
    # podAnnotations: {}
    # ClusterRole rules for Kubernetes service discovery (prometheus receiver)
    clusterRole:
      rules:
        - apiGroups: [""]
          resources: ["pods", "namespaces", "nodes", "services", "endpoints", "events"]
          verbs: ["get", "list", "watch"]
        - apiGroups: ["apps"]
          resources: ["replicasets"]
          verbs: ["get", "list", "watch"]
        - apiGroups: ["extensions"]
          resources: ["replicasets"]
          verbs: ["get", "list", "watch"]
        - apiGroups: ["batch"]
          resources: ["jobs"]
          verbs: ["get", "list", "watch"]
    config:
      receivers:
        # otlp:
        #   protocols:
        #     grpc: {}
        #     http: {}
        k8s_events:
          auth_type: serviceAccount
        prometheus:
          config:
            global:
              scrape_interval: 30s
              scrape_timeout: 10s
            scrape_configs:
              - job_name: kube-state-metrics
                kubernetes_sd_configs:
                  - role: endpoints
                relabel_configs:
                  - source_labels: [__meta_kubernetes_service_name]
                    action: keep
                    regex: .*kube-state-metrics
                  - source_labels: [__meta_kubernetes_endpoint_port_name]
                    action: keep
                    regex: http
              - job_name: apisix
                kubernetes_sd_configs:
                  - role: pod
                relabel_configs:
                  - source_labels:
                      [__meta_kubernetes_pod_label_app_kubernetes_io_name]
                    action: keep
                    regex: apisix
                  - source_labels: [__meta_kubernetes_pod_ip]
                    target_label: __address__
                    replacement: ${1}:9091
              # scrape all the pods with the signoz annotations on them
              - job_name: "signoz-annotated-pods"
                kubernetes_sd_configs:
                  - role: pod
                relabel_configs:
                  - source_labels:
                      [__meta_kubernetes_pod_annotation_signoz_io_scrape]
                    action: keep
                    regex: true
                  - source_labels:
                      [__meta_kubernetes_pod_annotation_signoz_io_path]
                    action: replace
                    target_label: __metrics_path__
                    regex: (.+)
                  - source_labels:
                      [
                        __meta_kubernetes_pod_ip,
                        __meta_kubernetes_pod_annotation_signoz_io_port,
                      ]
                    action: replace
                    regex: ([^;]+);([^;]+)
                    replacement: $1:$2
                    target_label: __address__
                  - source_labels: [__meta_kubernetes_namespace]
                    action: replace
                    target_label: kubernetes_namespace
                  - source_labels: [__meta_kubernetes_pod_name]
                    action: replace
                    target_label: kubernetes_pod_name
                  - source_labels:
                      [__meta_kubernetes_pod_label_app_kubernetes_io_instance]
                    action: replace
                    target_label: app
      service:
        pipelines:
          logs:
            receivers:
              - k8s_events
              - otlp
              - httplogreceiver/heroku
              - httplogreceiver/json
          metrics:
            receivers:
              - otlp
              - prometheus
  clickhouse:
    zookeeper:
      image:
        registry: docker.io
        repository: signoz/zookeeper
    image:
      registry: docker.io
      repository: clickhouse/clickhouse-server
    imagePullSecrets: *imagePullSecrets
    initContainers:
      udf:
        image:
          registry: container-registry.oracle.com
          repository: obaas/dashboards
          tag: "2.1.0"
        command:
          - sh
          - -c
          - |
            set -e
            node_os=$(uname -s | tr '[:upper:]' '[:lower:]')
            node_arch=$(uname -m | sed s/aarch64/arm64/ | sed s/x86_64/amd64/)
            echo "Node detected as ${node_os}/${node_arch}"
            src="/usr/local/bin/histogram-quantile/histogram-quantile_${node_os}_${node_arch}"
            dst="/var/lib/clickhouse/user_scripts/histogramQuantile"
            cp "$src" "$dst"
            chmod +x "$dst"
            echo "histogram-quantile installed successfully"
    clickhouseOperator:
      image:
        registry: docker.io
        repository: altinity/clickhouse-operator
      metricsExporter:
        image:
          registry: docker.io
          repository: altinity/metrics-exporter

k8s-infra:
  global:
    cloud: others
    clusterName: obaas
    deploymentEnvironment: obaas
  otelCollectorEndpoint: signoz-otel-collector:4317
  otelInsecure: true
  presets:
    otlpExporter:
      enabled: true
    loggingExporter:
      enabled: false
    logsCollection:
      operators:
        - id: container-parser
          type: container
        - type: json_parser
          id: java-json-parser
          parse_from: body
          if: 'body matches "^\\{"'
        - type: severity_parser
          parse_from: attributes.level
          if: 'attributes.level != nil'
        - type: trace_parser
          trace_id:
            parse_from: attributes.trace_id
          span_id:
            parse_from: attributes.span_id
          trace_flags:
            parse_from: attributes.trace_flags
          if: 'attributes.trace_id != nil'

kafka:
  enabled: false
  version: 4.2.0
  metadataVersion: 4.2-IV1

