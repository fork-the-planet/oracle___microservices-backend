{{- $testSecurityContext := deepCopy (.Values.securityContext | default dict) -}}
{{- if not (hasKey $testSecurityContext "runAsUser") -}}
{{- $_ := set $testSecurityContext "runAsUser" 65534 -}}
{{- end -}}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "obaas-app.fullname" . }}-test-connection"
  labels:
    {{- include "obaas-app.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  {{ with .Values.podSecurityContext }}
  securityContext:
    {{- toYaml . | nindent 4 }}
  {{ end }}
  containers:
    - name: wget
      {{ with $testSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{ end }}
      image: busybox
      command: ['wget']
      args: ['{{ include "obaas-app.fullname" . }}:{{ .Values.service.port }}']
  restartPolicy: Never
