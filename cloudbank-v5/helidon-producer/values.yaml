# helidon-producer Helm Configuration
fullnameOverride: "helidon-producer"

image:
  # Registry should be provided during deployment
  repository: "REGION.ocir.io/tenancy/cloudbank-v5/helidon-producer"
  tag: "5.0-SNAPSHOT"

obaas:
  releaseName: "obaas"  
  framework: "HELIDON"

helidon:
  datasource:
    name: "producer"

env:
  - name: OTEL_SERVICE_NAME
    value: "helidon-producer"
  - name: OTEL_INSTRUMENTATION_KAFKA_METRICS_ENABLED
    value: "true"
  - name: KAFKA_BOOTSTRAP_SERVERS
    value: "obaas-kafka-cluster-kafka-bootstrap:9092"
  - name: KAFKA_TOPIC
    value: "my-topic"

database:
  authN:
    secretName: "testkafka-db-authn"
  privAuthN:
    secretName: "testkafka-db-priv-authn"

# Eureka configuration
eureka:
  enabled: true
  instance:
    appname: "helidon-producer"

# Required Security Contexts for OpenTelemetry Auto-Instrumentation
# The OTEL Operator injects an init container to copy the Java agent.
# If runAsUser is not explicitly set, Kubernetes defaults to the base image's USER (root),
# which violates the runAsNonRoot: true policy and causes a CreateContainerConfigError.
# User 185 aligns with the Helidon Jib/S2I base image permissions.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 185
  runAsGroup: 0
  fsGroup: 0
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
