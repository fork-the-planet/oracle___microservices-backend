# Server configuration
server.port=8080
server.host=0.0.0.0

# Kafka Connector configuration (Consumer)
mp.messaging.incoming.from-kafka.connector=helidon-kafka
mp.messaging.incoming.from-kafka.topic=${KAFKA_TOPIC:my-topic}
mp.messaging.incoming.from-kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:kafka-bootstrap:9092}
mp.messaging.incoming.from-kafka.key.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.from-kafka.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.from-kafka.group.id=helidon-consumer-group
mp.messaging.incoming.from-kafka.enable.auto.commit=true
mp.messaging.incoming.from-kafka.auto.commit=true

# Enable Kafka Metrics (for MicroProfile Metrics)
# Note: OTEL metrics will be handled by the agent, but this enables Helidon's internal metrics
# which can also be useful.
# metrics.enabled=true

# OpenTelemetry Service Name
otel.service.name=helidon-consumer
java.util.logging.config.file=logging.properties
