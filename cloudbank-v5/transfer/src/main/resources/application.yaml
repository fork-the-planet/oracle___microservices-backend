spring:
  application:
    name: transfer
  mvc:
    enforced-prefixes:
      - /actuator
      - /rest
    url-mappings:
      - "/rest/*"
      - "/actuator/*"
      - "/error/*"
  microtx:
    lra:
      coordinator-url: ${MP_LRA_COORDINATOR_URL}
      propagation-active: true
      headers-propagation-prefix: "{x-b3-, oracle-tmm-, authorization, refresh-}"
  cloud:
    config:
      import-check:
        enabled: false
  config:
    import: classpath:common.yaml

# Use k8s DNS to lookup the other microservices
account:
  lookup:
    url: http://account:8080/api/v1/account
  deposit:
    url: http://account:8080/deposit
  withdraw:
    url: http://account:8080/withdraw
transfer:
  cancel:
    url: http://transfer:8080/cancel
    process:
      url: http://transfer:8080/processcancel
  confirm:
    url: http://transfer:8080/confirm
    process:
      url: http://transfer:8080/processconfirm
