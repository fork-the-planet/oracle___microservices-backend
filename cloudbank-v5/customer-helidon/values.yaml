# customer-helidon Helm Configuration
fullnameOverride: "customer-helidon"

image:
  # Registry provided by user
  repository: "REGION.ocir.io/TENANCY/cloudbank-v5/customer-helidon"
  # Version from pom.xml
  tag: "5.0-SNAPSHOT"

obaas:
  # Release name confirmed via 'helm list'
  releaseName: "obaas"  
  framework: "HELIDON"

helidon:
  datasource:
    name: "customer"


database:
  # OMITTING name to prevent db-init job from running (since we don't have admin creds)
  # name: "obaasclient" 
  
  # Explicitly using the existing tenant db secret found in the cluster
  authN:
    secretName: "obaas-db-authn"
  privAuthN:
    secretName: "db-admin-creds"


# Eureka configuration is largely handled by the chart templates, 
# but we can explicitly set the app name if needed.
eureka:
  enabled: true
  instance:
    appname: "helidon-customer-service"

# Required Security Contexts for OpenTelemetry Auto-Instrumentation
# The OTEL Operator injects an init container to copy the Java agent.
# If runAsUser is not explicitly set, Kubernetes defaults to the base image's USER (root),
# which violates the runAsNonRoot: true policy and causes a CreateContainerConfigError.
# User 185 aligns with the Helidon Jib/S2I base image permissions.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 185
  runAsGroup: 0
  fsGroup: 0
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
